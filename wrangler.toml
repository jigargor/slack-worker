name = "slack-worker"
main = "src/index.ts"
compatibility_date = "2025-05-01"

[build]
command = "npm run codegen"

[[kv_namespaces]]
binding = "KV"
id = "62a3a3eafd7148b49b25ca4d221e4353"

# Non-secret vars — safe to commit
[vars]
SLACK_SCOPES = "chat:write,channels:history"
SLACK_REDIRECT_URI = "https://slack-worker.gorjigaru.workers.dev/slack/oauth/callback"

# Secrets set via `wrangler secret put`:
#   SLACK_CLIENT_ID
#   SLACK_CLIENT_SECRET
#   SLACK_SIGNING_SECRET
#   SLACK_BOT_TOKEN        (after install)
#   CURSOR_API_KEY          (for dispatch)
